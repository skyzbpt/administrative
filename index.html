<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領航物理治療所 · 行政櫃檯管理系統</title>
<link rel="icon" href="favicon.ico?v=4">
<link rel="shortcut icon" href="favicon.ico?v=4">
<link rel="apple-touch-icon" href="logo.png?v=4">
<style>
:root{
  --bg:#f4f9fc; --surface:#ffffff; --ink:#0e2433; --muted:#5d758a; --faint:#9cb2c3;
  --line:#e4eef4; --line-2:#eef5f9;
  --sky:#0ea5e9; --sky-600:#0284c7; --sky-700:#036aa1; --sky-50:#eef8fe; --sky-100:#dcf1fd;
  --ok:#15a34a; --ok-bg:#e9f8ef; --warn:#c97a06; --warn-bg:#fdf2e1; --bad:#d6342c; --bad-bg:#fdecea;
  --radius:14px; --shadow:0 1px 2px rgba(14,36,51,.04),0 6px 22px rgba(14,36,51,.05);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei","Noto Sans TC","Segoe UI",sans-serif;
  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer}
input,select{font-family:inherit; font-size:13px}
.tnum{font-variant-numeric:tabular-nums}

/* ---------- App frame ---------- */
.app{display:flex; min-height:100vh}
.side{
  width:228px; flex:0 0 228px; background:var(--surface); border-right:1px solid var(--line);
  position:sticky; top:0; height:100vh; display:flex; flex-direction:column; padding:18px 14px;
}
.brand{display:flex; align-items:center; gap:11px; padding:6px 8px 18px}
.brand .mark{width:38px;height:38px;border-radius:11px;background:linear-gradient(150deg,var(--sky),var(--sky-700));
  display:grid;place-items:center;box-shadow:0 4px 12px rgba(2,132,199,.28);flex:0 0 auto}
.brand .mark svg{width:22px;height:22px}
.brand .t1{font-weight:700;font-size:15px;letter-spacing:.3px;line-height:1.2}
.brand .t2{font-size:11.5px;color:var(--faint);letter-spacing:.5px;font-weight:600}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;color:var(--muted);
  padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:600;text-align:left;letter-spacing:.2px;
  position:relative;transition:.15s;
}
.nav button svg{width:18px;height:18px;flex:0 0 auto;opacity:.85}
.nav button:hover{background:var(--sky-50);color:var(--sky-700)}
.nav button.on{background:var(--sky-50);color:var(--sky-700)}
.nav button.on::before{content:"";position:absolute;left:-14px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--sky-600)}
.side .foot{margin-top:auto;padding:10px 8px 0;font-size:11px;color:var(--faint);line-height:1.5}
.side .foot b{color:var(--muted)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:20;background:rgba(244,249,252,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:13px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.topbar .crumb{font-size:13px;color:var(--muted);font-weight:600}
.topbar .crumb b{color:var(--ink)}
.topbar .spacer{flex:1}
.monthpill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:6px 8px 6px 12px;box-shadow:var(--shadow)}
.monthpill label{font-size:12px;color:var(--faint);font-weight:700;letter-spacing:.5px}
.monthpill input{width:62px;border:0;background:var(--line-2);border-radius:7px;padding:5px 8px;text-align:center;font-weight:700;color:var(--sky-700)}
.monthpill .sep{color:var(--faint)}
.stepper{display:flex;align-items:stretch;gap:3px}
.stepper input[type=number]{-moz-appearance:textfield;appearance:textfield}
.stepper input[type=number]::-webkit-outer-spin-button,
.stepper input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.steparrows{display:flex;flex-direction:column;gap:2px}
.steparrows button{border:1px solid var(--line);background:var(--surface);color:var(--sky-700);
  border-radius:5px;width:22px;height:13px;line-height:1;font-size:8px;padding:0;display:grid;place-items:center;transition:.12s}
.steparrows button:hover{background:var(--sky-50);border-color:var(--sky-100)}
.steparrows button:active{background:var(--sky-100);transform:scale(.94)}
.btn{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:10px;
  padding:8px 13px;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:7px;box-shadow:var(--shadow);transition:.15s}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--sky-100);color:var(--sky-700);background:var(--sky-50)}
.btn.primary{background:linear-gradient(150deg,var(--sky),var(--sky-600));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(2,132,199,.32)}
.btn.primary:hover{filter:brightness(1.04);color:#fff}
@keyframes lh-spin{to{transform:rotate(360deg)}}
@keyframes lh-pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
#btnPull.syncing svg{animation:lh-spin .7s linear infinite;transform-origin:50% 50%}
#btnPull.syncing{color:var(--sky-700);border-color:var(--sky-100);background:var(--sky-50)}
#btnPull.ok{color:var(--ok);border-color:var(--ok);background:var(--ok-bg)}
#btnPull.ok svg{animation:lh-pop .45s ease}
#btnPull.bad{color:var(--bad);border-color:var(--bad);background:var(--bad-bg)}

.wrap{padding:26px 28px 64px;max-width:1180px;width:100%}
.head{margin:2px 0 20px}
.eyebrow{font-size:11.5px;font-weight:800;letter-spacing:2px;color:var(--sky-600);text-transform:uppercase}
.head h2{margin:5px 0 0;font-size:23px;font-weight:800;letter-spacing:.4px}
.head p{margin:6px 0 0;color:var(--muted);font-size:13.5px;max-width:740px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.card .ch{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line-2)}
.card .ch h3{margin:0;font-size:14.5px;font-weight:800;letter-spacing:.3px}
.card .ch .hint{font-size:12px;color:var(--faint);font-weight:600}
.card .ch .spacer{flex:1}
.card .cb{padding:16px 18px}
.card .cb.flush{padding:0}

/* ---------- Tables ---------- */
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{font-size:11px;font-weight:800;letter-spacing:.6px;color:var(--faint);text-transform:uppercase;
  text-align:left;padding:11px 12px;background:var(--sky-50);border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tr:last-child td{border-bottom:0}
.tbl tbody tr:hover{background:var(--sky-50)}
.tbl td.num,.tbl th.num{text-align:right;font-variant-numeric:tabular-nums}
.tbl .total td{background:var(--sky-100);font-weight:800;color:var(--sky-700);border-top:2px solid var(--sky)}
.tbl .total tr:hover{background:var(--sky-100)}
.scroll{overflow-x:auto}
.cell-in{width:100%;border:1px solid var(--line);border-radius:8px;padding:6px 8px;background:#fff;color:var(--ink)}
.cell-in:focus{outline:0;border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-50)}
select.cell-in{cursor:pointer}
.ro{color:var(--ink);font-weight:700}
.muted{color:var(--muted)}
.del{border:0;background:transparent;color:var(--faint);width:28px;height:28px;border-radius:8px;font-size:16px;line-height:1}
.del:hover{background:var(--bad-bg);color:var(--bad)}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:800;letter-spacing:.3px;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:var(--ok)} .b-warn{background:var(--warn-bg);color:var(--warn)} .b-bad{background:var(--bad-bg);color:var(--bad)}

/* ---------- KPI ---------- */
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;left:20px;right:20px;bottom:0;height:3px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--sky),var(--sky-100))}
.kpi .lab{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.kpi .lab svg{width:16px;height:16px;color:var(--sky-600)}
.kpi .val{font-size:30px;font-weight:800;letter-spacing:.5px;margin-top:8px;color:var(--sky-700);font-variant-numeric:tabular-nums}
.kpi .val small{font-size:14px;font-weight:700;color:var(--faint);margin-right:3px}
.kpi .sub{font-size:12px;color:var(--faint);margin-top:3px}

/* ---------- Param blocks ---------- */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.miniform{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:800;color:var(--faint);letter-spacing:.5px}
.fld input,.fld select{border:1px solid var(--line);border-radius:8px;padding:7px 9px;background:#fff}
.fld input:focus,.fld select:focus{outline:0;border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-50)}
.prodsearch{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 12px;background:#fff;margin-bottom:0}
.prodsearch:focus{outline:0;border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-50)}
.prodlist{max-height:330px;overflow:auto}

/* ---------- Schedule grid ---------- */
.sched{border-collapse:collapse;font-size:12px;white-space:nowrap}
.sched th,.sched td{border:1px solid var(--line-2);padding:0;text-align:center}
.sched th{background:var(--sky-50);font-weight:800;color:var(--muted);padding:6px 4px;font-size:11px;position:sticky;top:0}
.sched th.we{color:var(--sky-700)} .sched th.ho{background:var(--bad-bg);color:var(--bad)}
.sched .nm{position:sticky;left:0;background:#fff;font-weight:700;text-align:left;padding:7px 12px;min-width:138px;z-index:2;border-right:2px solid var(--line)}
.sched th.nm{z-index:3}
.sched td.day select{border:0;background:transparent;width:42px;text-align:center;padding:8px 0;font-weight:700;color:var(--ink);appearance:none;cursor:pointer}
.sched td.day select:focus{outline:0;background:var(--sky-50)}
.sched td.ho{background:var(--bad-bg)}
.sched td.we{background:#f4fbff}
.sched td.tot{background:#fff;font-weight:800;color:var(--sky-700);min-width:78px;font-variant-numeric:tabular-nums;border-left:2px solid var(--line)}
.sched .chk td{background:var(--sky-50);font-size:11px;font-weight:700;padding:6px 2px}
.sched .chk .nm{background:var(--sky-50)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);padding:2px 2px 0}
.legend span{display:inline-flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}
.weekblock{margin-bottom:18px}
.weekblock:last-child{margin-bottom:0}
.weeklabel{font-size:12px;font-weight:800;color:var(--sky-700);letter-spacing:.6px;margin:0 0 7px;padding-left:2px}

/* ---------- Payslip ---------- */
.slip{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.slip .sh{background:linear-gradient(150deg,var(--sky),var(--sky-700));color:#fff;padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
.slip .sh .l1{font-size:12px;letter-spacing:2px;font-weight:700;opacity:.85}
.slip .sh .l2{font-size:18px;font-weight:800;margin-top:3px}
.slip .sh .r{text-align:right;font-size:12px;opacity:.92}
.slip .sb{padding:22px 24px}
.slip .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;padding-bottom:16px;border-bottom:1px dashed var(--line);margin-bottom:16px}
.slip .meta div{font-size:13px} .slip .meta b{color:var(--faint);font-weight:700;font-size:11.5px;letter-spacing:.5px;display:block;margin-bottom:2px}
.slip .two{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.slip .col h4{margin:0 0 9px;font-size:12px;font-weight:800;letter-spacing:.5px;padding-bottom:7px;border-bottom:2px solid var(--line-2)}
.slip .col.pos h4{color:var(--ok)} .slip .col.neg h4{color:var(--bad)}
.slip .li{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line-2)}
.slip .li span:last-child{font-weight:700;font-variant-numeric:tabular-nums}
.slip .net{margin-top:18px;background:var(--sky-50);border:1px solid var(--sky-100);border-radius:11px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.slip .net .lab{font-size:13px;font-weight:800;color:var(--sky-700);letter-spacing:.5px}
.slip .net .v{font-size:26px;font-weight:800;color:var(--sky-700);font-variant-numeric:tabular-nums}
.slip .sign{margin-top:20px;padding-top:16px;border-top:1px dashed var(--line);display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:12.5px;color:var(--muted)}
.slip .sign .ln{margin-top:14px;border-bottom:1px solid var(--ink);height:1px}

.empty{padding:34px;text-align:center;color:var(--faint);font-size:13px}
.note{font-size:12.5px;color:var(--muted);background:var(--sky-50);border:1px solid var(--sky-100);border-radius:10px;padding:11px 14px;margin-bottom:4px;line-height:1.6}
.note b{color:var(--sky-700)}
.addbtn{border:1px dashed var(--sky-100);background:var(--sky-50);color:var(--sky-700);border-radius:10px;padding:9px 14px;font-weight:800;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.addbtn:hover{background:var(--sky-100)}
.addbtn svg{width:15px;height:15px}
.btn.sm{padding:7px 12px;font-size:12.5px}
.btn.savebtn{background:var(--sky);color:#fff;border-color:var(--sky)}
.btn.savebtn:hover{background:var(--sky-600)}
.btn.savebtn.saved{background:var(--ok);border-color:var(--ok)}
.btn.savebtn svg{width:15px;height:15px}

@media(max-width:920px){
  .side{position:fixed;bottom:0;top:auto;left:0;right:0;width:auto;height:auto;flex-direction:row;border-right:0;border-top:1px solid var(--line);padding:8px;z-index:50;overflow-x:auto}
  .brand,.side .foot{display:none}
  .nav{flex-direction:row;gap:4px}
  .nav button{flex-direction:column;gap:3px;font-size:10px;padding:7px 9px;white-space:nowrap}
  .nav button.on::before{display:none}
  #btnLogout{flex:0 0 auto;margin:0 0 0 4px;padding:7px 10px;font-size:11px;white-space:nowrap;align-self:center}
  .main{padding-bottom:74px}
  .wrap{padding:18px 14px 40px}
  .topbar{padding:11px 14px}
  .kpis,.pgrid{grid-template-columns:1fr}
  .slip .two,.slip .meta{grid-template-columns:1fr}
}
@media print{
  *{ -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important }
  .side,.topbar,.head,.no-print{display:none!important}
  .app{display:block!important} .main{display:block!important}
  .wrap{display:block!important;padding:0!important;margin:0!important;max-width:none!important;width:auto!important}
  #view>.card,.card.no-print{display:none!important}
  #view .slip{display:block!important;max-width:none!important;width:100%!important;margin:0!important;border:none!important;box-shadow:none!important;border-radius:0!important}
  body{background:#fff!important}
  @page{ margin:14mm }
}
/* ---- kiosk (front-desk punch) ---- */
.kio{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 18px 16px;display:flex;flex-direction:column}
.kcard .kh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.kcard .kname{font-size:18px;font-weight:800;color:var(--ink)}
.kcard .kshift{font-size:12px;color:var(--muted);font-weight:700}
.kslots{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.kslot{border:1px solid var(--line-2);border-radius:10px;padding:8px 10px;background:var(--sky-50)}
.kslot .l{font-size:11px;color:var(--faint);font-weight:700;letter-spacing:.3px}
.kslot .t{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px;color:var(--faint)}
.kslot.done{background:var(--ok-bg);border-color:var(--ok)}
.kslot.done .t{color:var(--ok)}
.kbtn{width:100%;border:0;border-radius:11px;padding:14px;font-size:16px;font-weight:800;color:#fff;background:linear-gradient(150deg,var(--sky),var(--sky-700));cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.kbtn:active{transform:translateY(1px)}
.kbtn[disabled]{background:var(--line);color:var(--faint);cursor:default}
.kbtn svg{width:18px;height:18px}
.kclock{display:flex;align-items:center;gap:16px;background:linear-gradient(150deg,var(--sky),var(--sky-700));color:#fff;border-radius:var(--radius);padding:16px 22px;margin-bottom:18px;box-shadow:var(--shadow)}
.kclock .time{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;line-height:1}
.kclock .date{font-size:13px;opacity:.92;font-weight:600}
.kclock .ho{margin-left:auto;background:rgba(255,255,255,.18);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700}
@media(max-width:560px){ .kclock .time{font-size:28px} }
/* ---- public gate (front desk) ---- */
.gatewrap{min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.gatebar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.gbrand{display:flex;align-items:center;gap:12px}
.gbrand .mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--sky),var(--sky-700));display:flex;align-items:center;justify-content:center}
.gbrand .mark svg{width:24px;height:24px}
/* logo image */
.brand .mark,.gbrand .mark{background:#fff!important;overflow:hidden}
.brand .mark img,.gbrand .mark img{width:100%;height:100%;object-fit:contain;display:block}
.gbrand .t1{font-weight:800;font-size:17px;color:var(--ink);line-height:1.2}
.gbrand .t2{font-size:12px;color:var(--faint);font-weight:600;letter-spacing:.5px}
.gatebody{flex:1;width:100%;max-width:1100px;margin:0 auto;padding:24px 22px 48px}
.gatefoot{margin-top:24px;font-size:12.5px;color:var(--faint);text-align:center;line-height:1.6}
.login .fld{margin-bottom:13px}
.login label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
.login input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--ink);background:#fff}
.login input:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3px var(--sky-100)}
.login .err{color:var(--bad);font-size:12.5px;font-weight:700;min-height:16px;margin-top:2px}
/* ---- backup modal ---- */
.ov{position:fixed;inset:0;background:rgba(14,36,51,.46);display:flex;align-items:center;justify-content:center;z-index:1000;padding:18px}
.ov .box{background:#fff;border-radius:16px;box-shadow:0 18px 60px rgba(14,36,51,.28);width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:22px 22px 20px}
.ov h3{margin:0 0 4px;font-size:17px;font-weight:800;color:var(--ink)}
.ov p{margin:0 0 14px;font-size:13px;color:var(--muted);line-height:1.6}
.ov textarea{width:100%;height:150px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--ink);resize:vertical;background:var(--sky-50)}
.ov .row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.ov .row .btn{flex:1;min-width:120px;justify-content:center}
.btn.cfdanger{background:var(--bad);color:#fff;border-color:var(--bad)}
.btn.cfdanger:hover{filter:brightness(1.06);color:#fff}
.ov .x{float:right;cursor:pointer;color:var(--faint);font-size:20px;line-height:1;border:0;background:none;padding:0}
.ov .ok{font-size:12.5px;color:var(--ok);font-weight:700;margin-top:9px;min-height:16px}
</style>
</head>
<body>
<div id="gate"></div>
<div class="app" id="adminApp" style="display:none">
  <aside class="side">
    <div class="brand">

let WORKER_URL='', WORKER_SECRET='', _syncStatus='idle', _syncTimer=null;
const DEFAULT_WORKER_URL='https://administrative.nycuptc.workers.dev';
const DEFAULT_WORKER_SECRET='navicare';
function loadCloudConfig(){
  try{
    WORKER_URL=localStorage.getItem('_cf_url')||DEFAULT_WORKER_URL;

  }catch(e){ WORKER_URL=DEFAULT_WORKER_URL; WORKER_SECRET=DEFAULT_WORKER_SECRET; }
}
function saveCloudConfig(){ try{ localStorage.setItem('_cf_url',WORKER_URL); localStorage.setItem('_cf_sec',WORKER_SECRET); }catch(e){} }
function updateSyncBadge(){
  const b=document.getElementById('syncBadge'); if(!b) return;
  const btn=document.getElementById('btnPull');
  if(btn){
    btn.classList.toggle('syncing', _syncStatus==='syncing');
    btn.classList.toggle('ok', _syncStatus==='ok');
    btn.classList.toggle('bad', _syncStatus==='error');
  }
  if(!WORKER_URL){ b.style.display='none'; return; }
  b.style.display='inline-flex';
  const map={ syncing:['b-warn','⟳ 同步中'], ok:['b-ok','✓ 已同步'], error:['b-bad','⚠ 失敗'], idle:['','☁ 雲端'] };
  const [cls,txt]=map[_syncStatus]||['',''];
  b.className='badge '+cls; b.textContent=txt;
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function pullFromCloud(){
  if(!WORKER_URL) return false;
  _syncStatus='syncing'; updateSyncBadge();
  const t0=Date.now();
  const keepSpin=async()=>{ const w=450-(Date.now()-t0); if(w>0) await sleep(w); };
  try{
    const res=await fetch(WORKER_URL+'/api/db',{headers:{'X-Auth-Token':WORKER_SECRET}});
    if(res.ok){
      const data=await res.json();
      await keepSpin();
      if(data&&data.staff!==undefined){ DB=migrate(data); try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} _syncStatus='ok'; updateSyncBadge(); return true; }
      // 雲端尚無資料（首次使用）：改為把本機資料上傳，並視為成功
      _syncStatus='ok'; updateSyncBadge(); pushToCloud(); return false;
    }
    await keepSpin(); _syncStatus='error'; updateSyncBadge();
  }catch(e){ await keepSpin(); _syncStatus='error'; updateSyncBadge(); }
  return false;
}
function pushToCloud(immediate){
  if(!WORKER_URL) return;
  clearTimeout(_syncTimer);
  const run=async()=>{
    _syncStatus='syncing'; updateSyncBadge();
    const t0=Date.now();
    try{
      const res=await fetch(WORKER_URL+'/api/db',{method:'POST',headers:{'Content-Type':'application/json','X-Auth-Token':WORKER_SECRET},body:JSON.stringify(DB)});
      const w=450-(Date.now()-t0); if(w>0) await sleep(w);
      _syncStatus=res.ok?'ok':'error';
    }catch(e){ const w=450-(Date.now()-t0); if(w>0) await sleep(w); _syncStatus='error'; }
    updateSyncBadge();
  };
  if(immediate) run(); else _syncTimer=setTimeout(run,600);
}
function openCloudSettings(){

    '<div class="login">'+
      '<div class="fld"><label>Worker 網址</label><input id="cfUrl" placeholder="https://lh-payroll.your-name.workers.dev" value="'+esc(WORKER_URL)+'"></div>'+
      '<div class="fld"><label>密鑰 (API_SECRET)</label><input id="cfSec" type="password" placeholder="自訂密鑰字串" value="'+esc(WORKER_SECRET)+'"></div>'+
      '<div class="ok" id="cfMsg" style="min-height:18px;margin-top:4px"></div>'+
    '</div>'+
    '<div class="row">'+
      '<button class="btn" id="cfTest">測試連線</button>'+
      '<button class="btn primary" id="cfSave" style="flex:1;justify-content:center">儲存設定</button>'+
    '</div>'
  );
  document.getElementById('ovClose').onclick=closeOv;
  document.getElementById('cfSave').onclick=()=>{
    WORKER_URL=document.getElementById('cfUrl').value.trim().replace(/\/$/,'');
    WORKER_SECRET=document.getElementById('cfSec').value.trim();
    saveCloudConfig(); updateSyncBadge(); closeOv();
    if(WORKER_URL) pullFromCloud().then(ok=>{ if(ok) render(); });
  };
  document.getElementById('cfTest').onclick=async()=>{
    const url=document.getElementById('cfUrl').value.trim().replace(/\/$/,'');
    const sec=document.getElementById('cfSec').value.trim();
    const msg=document.getElementById('cfMsg');
    msg.style.color='var(--warn)'; msg.textContent='測試中…';
    try{
      const res=await fetch(url+'/api/db',{headers:{'X-Auth-Token':sec}});
      if(res.ok){ msg.style.color='var(--ok)'; msg.textContent='✓ 連線成功！可以儲存設定。'; }
      else if(res.status===401){ msg.style.color='var(--bad)'; msg.textContent='✕ 密鑰錯誤，請確認 API_SECRET。'; }
      else{ msg.style.color='var(--bad)'; msg.textContent='✕ HTTP '+res.status+'，請確認 Worker 設定。'; }
    }catch(e){ msg.style.color='var(--bad)'; msg.textContent='✕ 無法連線，請確認 Worker URL。'; }
  };
}

/* ============================== HELPERS ============================== */
const SHIFT_OPTS=['','A','B','C','D','E','休','事假','病假'];
const SHIFT_HOURS={A:8,B:8,C:4,D:4,E:4};
const pad2=n=>String(n).padStart(2,'0');
const fmt=n=>{ n=Math.round(Number(n)||0); return n.toLocaleString('en-US'); };
const r1=x=>Math.round((Number(x)||0)*10)/10;
function ymPrefix(){ return DB.schedule.year+'/'+pad2(DB.schedule.month)+'/'; }
function isHoliday(d){ return DB.holidays.some(h=>h.date===d); }
function holidayName(d){ const h=DB.holidays.find(x=>x.date===d); return h?h.name:''; }
function productBonus(name){ const p=DB.products.find(x=>x.name===name); return p?Number(p.bonus)||0:0; }
function staffByName(n){ return DB.staff.find(s=>s.name===n); }
function isPartTime(s){ return /兼職/.test(s.title)||/兼職/.test(s.name); }
function diffH(a,b){ if(!a||!b) return 0; const[ah,am]=a.split(':').map(Number); const[bh,bm]=b.split(':').map(Number); return ((bh*60+bm)-(ah*60+am))/60; }
function punchHours(p){
  if(p.manual!=='' && p.manual!=null && !isNaN(p.manual)) return Math.round(Number(p.manual)*2)/2;
  let h=0;
  if(p.in1&&p.out1) h+=r1(diffH(p.in1,p.out1));
  if(p.in2&&p.out2) h+=r1(diffH(p.in2,p.out2));
  return r1(h);
}
function punchOT(p){ const h=punchHours(p); if(isHoliday(p.date)) return 0; return h>8?r1(h-8):0; }
function punchHol(p){ return isHoliday(p.date)?punchHours(p):0; }
function bonusCalc(b){
  const isReview = b.product==='Google 5星好評';
  const per = isReview ? 0 : productBonus(b.product);
  const sub = isReview ? 0 : (Number(b.qty)||0)*per;
  const reviews = isReview ? (Number(b.reviews)||0) : 0;
  const perRev = reviews>0 ? (Number(DB.params.googleReview)||0) : 0;
  const rev = reviews*perRev;
  return {per,sub,perRev,rev,total:sub+rev};
}
function scheduleLeave(name){
  const days=new Date(DB.schedule.year,DB.schedule.month,0).getDate();
  for(let d=1; d<=days; d++){ const v=DB.schedule.shifts[name+'__'+d]; if(v==='事假'||v==='病假') return true; }
  return false;
}
function payrollFor(s){
  const ps = DB.punches.filter(p=>p.staff===s.name && p.date.startsWith(ymPrefix()));
  const bs = DB.bonuses.filter(b=>b.staff===s.name && b.date.startsWith(ymPrefix()));
  let total=0, ot=0, hol=0;
  ps.forEach(p=>{ total+=punchHours(p); ot+=punchOT(p); hol+=punchHol(p); });
  total=r1(total); ot=r1(ot); hol=r1(hol);
  const reg=r1(total-ot-hol);
  const hr=Number(s.hourly)||0;
  const base=Math.round(hr*reg);
  const otPay=Math.round(hr*(Number(DB.params.otRate1)||0)*Math.min(2,ot) + hr*(Number(DB.params.otRate2)||0)*Math.max(0,ot-2));
  const holPay=Math.round(hr*(Number(DB.params.holRate)||2)*hol);
  const leaveDeduct=0;
  const warn = ps.some(p=>p.status && p.status!=='正常');
  const voided = isPartTime(s) || scheduleLeave(s.name) || warn;
  const perfect = voided ? 0 : (Number(s.perfect)||0);
  let prodSub=0, rev=0, reviews=0, bonusTotal=0;
  bs.forEach(b=>{ const c=bonusCalc(b); prodSub+=c.sub; rev+=c.rev; reviews+=(b.product==='Google 5星好評'?(Number(b.reviews)||0):0); bonusTotal+=c.total; });
  const insurance=Number(s.insurance)||0;
  const net = base+otPay+holPay-leaveDeduct+perfect+bonusTotal-insurance;
  return {total,reg,ot,hol,base,otPay,holPay,leaveDeduct,perfect,voided,warn,prodSub,rev,reviews,bonusTotal,insurance,net};
}

function render(){
  if(window.__kioskTimer){ clearInterval(window.__kioskTimer); window.__kioskTimer=null; }

  const v=VIEWS.find(x=>x.id===current);
  document.getElementById('crumb').innerHTML='管理系統　/　<b>'+v.label+'</b>';
  document.getElementById('topYear').value=DB.schedule.year;

  ({dashboard:viewDashboard,params:viewParams,schedule:viewSchedule,punch:viewPunch,bonus:viewBonus,payroll:viewPayroll,payslip:viewPayslip}[current])();

}

function saveBtnHTML(id){ return '<button class="btn sm savebtn" id="'+id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 7h6"/></svg>儲存</button>'; }
function wireSave(btnId){
  const b=document.getElementById(btnId); if(!b) return;
  b.onclick=()=>{
    // ensure the focused field commits before saving
    if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
    save();
    pushToCloud(true); // 點儲存即立即上傳雲端（不等待防抖）
    const html=b.innerHTML; b.classList.add('saved');
    b.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>已儲存';
    setTimeout(()=>{ b.classList.remove('saved'); b.innerHTML=html; }, 1400);
  };
}

/* ============================== VIEW: SCHEDULE ============================== */
function viewSchedule(){
  const y=DB.schedule.year, m=DB.schedule.month;
  const days=new Date(y,m,0).getDate();
  const wk=['日','一','二','三','四','五','六'];
  const ymd=d=>y+'/'+pad2(m)+'/'+pad2(d);

  // 每 7 天一段
  let blocks='';
  for(let start=1; start<=days; start+=7){
    const end=Math.min(start+6, days);
    let head_='';
    for(let d=start; d<=end; d++){ const jd=new Date(y,m-1,d).getDay(); const we=(jd===0||jd===6); const ho=isHoliday(ymd(d)); head_+='<th class="'+(ho?'ho':we?'we':'')+'" title="'+(ho?esc(holidayName(ymd(d))):'')+'">'+d+'<br><span style="font-weight:600">'+wk[jd]+'</span></th>'; }
    let body='';
    DB.staff.forEach(s=>{
      let cells=''; let hrs=0;
      for(let d=start; d<=end; d++){ const jd=new Date(y,m-1,d).getDay(); const we=(jd===0||jd===6); const ho=isHoliday(ymd(d));
        const cur=DB.schedule.shifts[s.name+'__'+d]||'';
        if(SHIFT_HOURS[cur]) hrs+=SHIFT_HOURS[cur];
        cells+='<td class="day '+(ho?'ho':we?'we':'')+'"><select data-name="'+esc(s.name)+'" data-day="'+d+'">'+SHIFT_OPTS.map(o=>'<option '+(o===cur?'selected':'')+'>'+o+'</option>').join('')+'</select></td>';
      }
      body+='<tr><td class="nm">'+esc(s.name)+'</td>'+cells+'<td class="tot">'+hrs+' hr</td></tr>';
    });
    let chk='<tr class="chk"><td class="nm">每日櫃檯人力確認</td>';
    for(let d=start; d<=end; d++){ chk+='<td>'+staffingBadge(d)+'</td>'; }
    chk+='<td class="tot"></td></tr>';
    blocks+='<div class="weekblock"><div class="weeklabel">'+m+' 月 '+start+'–'+end+' 日</div>'+
      '<div class="scroll"><table class="sched"><thead><tr><th class="nm">行政人員</th>'+head_+'<th class="tot">本週工時</th></tr></thead>'+
      '<tbody>'+body+chk+'</tbody></table></div></div>';
  }

  // 本月總計（整月工時與估薪）
  let sumRows='';
  DB.staff.forEach(s=>{
    let hrs=0;
    for(let d=1; d<=days; d++){ const v=DB.schedule.shifts[s.name+'__'+d]; if(SHIFT_HOURS[v]) hrs+=SHIFT_HOURS[v]; }
    sumRows+='<tr><td><b>'+esc(s.name)+'</b></td><td class="num tnum">'+hrs+' 小時</td><td class="num tnum">NT$ '+fmt(hrs*(Number(s.hourly)||0))+'</td></tr>';
  });
  const sumTbl = DB.staff.length ? ('<div class="weekblock"><div class="weeklabel">本月總計</div><div class="scroll"><table class="tbl"><thead><tr><th style="min-width:120px">行政人員</th><th class="num">整月總工時</th><th class="num">估算薪資</th></tr></thead><tbody>'+sumRows+'</tbody></table></div></div>') : '';

  V().innerHTML =
    head('Schedule','每月排班表',y+' 年 '+m+' 月　每 7 天為一段顯示。班別：A 早午班 / B 午晚班（8h）、C 早班 / D 午班 / E 晚班（4h）。人力規則：平日需早、午、晚都有人，假日需早、午有人。國定假日自動標紅底。')+
    '<div class="card" id="schedCard"><div class="ch"><h3>'+y+' 年 '+m+' 月　行政櫃檯排班</h3><div class="spacer"></div>'+
      '<span class="hint">點儲存格選擇班別</span>'+
      '<button class="btn sm no-print" id="btnSchedPdf" style="margin-left:10px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>另存PDF</button></div>'+
    '<div class="cb">'+blocks+sumTbl+'</div>'+
    '<div class="cb" style="padding-top:0"><div class="legend">'+
      '<span><i class="dot" style="background:var(--bad-bg);border:1px solid var(--bad)"></i>國定假日</span>'+
      '<span><i class="dot" style="background:#f4fbff;border:1px solid var(--sky-100)"></i>週末</span>'+
      '<span><span class="badge b-ok">✓ OK</span>人力足夠</span>'+
      '<span><span class="badge b-warn">⚠️ 缺班</span>需補人</span>'+
      '<span><span class="badge b-bad">❌ 休診</span>全天無班</span>'+
    '</div></div></div>';

  document.querySelectorAll('.sched select').forEach(sel=>{
    sel.onchange=()=>{ const key=sel.dataset.name+'__'+sel.dataset.day; if(sel.value) DB.schedule.shifts[key]=sel.value; else delete DB.schedule.shifts[key]; save(); viewSchedule(); };
  });
  const sp=document.getElementById('btnSchedPdf'); if(sp) sp.onclick=printSchedule;
}
function staffingBadge(d){
  const y=DB.schedule.year,m=DB.schedule.month;
  let A=0,B=0,C=0,D=0,E=0;
  DB.staff.forEach(s=>{ const v=DB.schedule.shifts[s.name+'__'+d]; if(v==='A')A++;else if(v==='B')B++;else if(v==='C')C++;else if(v==='D')D++;else if(v==='E')E++; });
  if(A+B+C+D+E===0) return '<span class="badge b-bad">❌ 休診</span>';
  const jd=new Date(y,m-1,d).getDay(); const weekend=(jd===0||jd===6);
  const morning=(A+C)>0;     // 早：A 早午 / C 早
  const noon=(A+B+D)>0;      // 午：A 早午 / B 午晚 / D 午
  const evening=(B+E)>0;     // 晚：B 午晚 / E 晚
  const miss=[];
  if(!morning) miss.push('早');
  if(!noon) miss.push('午');
  if(!weekend && !evening) miss.push('晚');   // 晚班僅平日要求
  if(miss.length===0) return '<span class="badge b-ok">✓ '+(weekend?'週末OK':'平日OK')+'</span>';
  return '<span class="badge b-warn">⚠️ 缺'+miss.join('')+'</span>';
}

/* ============================== FRONT DESK (public kiosk) ============================== */
function todayStr(){ const d=new Date(); return d.getFullYear()+'/'+pad2(d.getMonth()+1)+'/'+pad2(d.getDate()); }
function nowHM(){ const d=new Date(); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function kioskShift(name){
  const d=new Date();
  if(d.getFullYear()===DB.schedule.year && (d.getMonth()+1)===DB.schedule.month){
    const v=DB.schedule.shifts[name+'__'+d.getDate()];
    if(v && SHIFT_HOURS[v]) return v;
    if(v==='休'||v==='事假'||v==='病假') return v;
  }
  return 'A';
}
function findTodayPunch(name){ const ds=todayStr(); return DB.punches.find(p=>p.staff===name && p.date===ds); }
const KSLOTS=[['in1','上午上班'],['out1','上午下班'],['in2','下午上班'],['out2','下午下班']];
function kioskCards(){
  return DB.staff.map(s=>{
    const p=findTodayPunch(s.name);
    const sh=p?p.shift:kioskShift(s.name);
    const next=KSLOTS.find(([k])=>!(p&&p[k]));
    const slots=KSLOTS.map(([k,lab])=>{
      const val=p&&p[k]?p[k]:'';
      return '<div class="kslot'+(val?' done':'')+'"><div class="l">'+lab+'</div><div class="t">'+(val||'—')+'</div></div>';
    }).join('');
    const btn = next
      ? '<button class="kbtn" data-stamp="'+esc(s.name)+'" data-slot="'+next[0]+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v5l3 2M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Z"/></svg>'+next[1]+'打卡</button>'
      : '<button class="kbtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/></svg>今日打卡完成</button>';
    return '<div class="kcard"><div class="kh"><div class="kname">'+esc(s.name)+'</div>'+
      '<div class="kshift">今日班別 '+esc(sh)+'</div></div>'+
      '<div class="kslots">'+slots+'</div>'+btn+'</div>';
  }).join('') || '<div class="empty card">尚無同仁資料，請於後台「參數總控台」新增。</div>';
}

}

/* iOS/iPadOS Safari 無法從隱藏 iframe 列印（且 iPad 會偽裝成 Mac），改開新分頁；桌機維持隱藏 iframe */
function isIOS(){
  return /iP(hone|ad|od)/.test(navigator.platform)
    || (/Mac/.test(navigator.platform) && navigator.maxTouchPoints>1)
    || /iPhone|iPad|iPod/.test(navigator.userAgent);
}
function openPrint(docHtml){
  if(isIOS()){
    const hint='<div class="noprint-hint" style="position:fixed;left:0;right:0;bottom:0;padding:11px 14px;background:#0284c7;color:#fff;font-size:13px;line-height:1.5;text-align:center;z-index:99999">若未自動跳出列印，請點 Safari「分享」鈕 →「列印」，在預覽畫面用雙指向外放大後，即可用分享鈕儲存 PDF</div>'
      +'<style>@media print{.noprint-hint{display:none!important}}</style>'
      +'<script>setTimeout(function(){try{window.focus();window.print();}catch(e){}},700);<\/script>';
    const out=docHtml.replace('</body>', hint+'</body>');
    const w=window.open('','_blank');
    if(!w){ alert('瀏覽器擋住了新分頁，請允許彈出視窗後再按一次。'); return; }
    w.document.open(); w.document.write(out); w.document.close();
    return;
  }
  const ifr=document.createElement('iframe'); ifr.setAttribute('aria-hidden','true');
  ifr.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;opacity:0';
  document.body.appendChild(ifr);
  const w=ifr.contentWindow, d=w.document; d.open(); d.write(docHtml); d.close();
  const go=()=>{ try{w.focus();w.print();}catch(e){window.print();}
    setTimeout(()=>{if(ifr.parentNode)ifr.parentNode.removeChild(ifr);},900); };
  if(d.fonts&&d.fonts.ready){d.fonts.ready.then(()=>setTimeout(go,200));}else setTimeout(go,420);
}

/* Combined PDF：行政排班總表 + 個人薪資明細單（橫向 A4）*/
function printCombined(){
  const s=staffByName(slipStaff); if(!s) return;
  const y=DB.schedule.year, m=DB.schedule.month;
  const days=new Date(y,m,0).getDate();
  const wk=['日','一','二','三','四','五','六'];
  const ymd=d=>y+'/'+pad2(m)+'/'+pad2(d);
  // 排班表 header
  let thead='<tr><th style="min-width:72px;text-align:left;padding:4px 6px">員工</th>';
  for(let d=1;d<=days;d++){
    const jd=new Date(y,m-1,d).getDay(); const ho=isHoliday(ymd(d)); const we=(jd===0||jd===6);
    thead+='<th style="'+(ho?'background:#fdecea;color:#d6342c':we?'background:#f4fbff':'')+'">'
      +d+'<br><span style="font-weight:600">'+wk[jd]+'</span></th>';
  }
  thead+='<th style="border-left:2px solid #0ea5e9">時</th></tr>';
  // 排班表 rows
  let tbody='';
  DB.staff.forEach(st=>{
    let cells=''; let hrs=0;
    for(let d=1;d<=days;d++){
      const v=DB.schedule.shifts[st.name+'__'+d]||'';
      if(SHIFT_HOURS[v]) hrs+=SHIFT_HOURS[v];
      const jd=new Date(y,m-1,d).getDay(); const ho=isHoliday(ymd(d)); const we=(jd===0||jd===6);
      cells+='<td style="text-align:center;'+(ho?'background:#fdecea':we?'background:#f4fbff':'')+'">'+esc(v)+'</td>';
    }
    tbody+='<tr><td style="font-weight:700;white-space:nowrap;padding:5px 6px">'+esc(st.name)+'</td>'
      +cells+'<td style="font-weight:800;text-align:center;color:#036aa1;border-left:2px solid #0ea5e9">'+hrs+'</td></tr>';
  });
  const slipEl=document.querySelector('#view .slip');
  const html='<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><title>排班薪資_'+y+pad2(m)+'_'+esc(s.name)+'</title>'
    +'<style>*{box-sizing:border-box;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}'
    +'body{font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;margin:0;padding:14px;background:#fff;color:#0e2433}'
    +'.sec{font-size:13px;font-weight:800;color:#036aa1;border-bottom:2px solid #0ea5e9;padding-bottom:5px;margin:0 0 11px;letter-spacing:.5px}'
    +'table{border-collapse:collapse;width:100%;font-size:9.5px;margin-bottom:22px}'
    +'th,td{border:1px solid #e4eef4;padding:4px 2px;text-align:center}'
    +'th{background:#eef8fe;font-weight:800;color:#5d758a}'
    +SLIP_PRINT_CSS
    +'@page{size:A4 landscape;margin:10mm}'
    +'</style></head><body>'
    +'<div class="sec">領航物理治療所　'+y+' 年 '+m+' 月　行政排班總表</div>'
    +'<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>'
    +'<div class="sec" style="margin-top:6px">薪資明細單　'+esc(s.name)+'　'+y+' 年 '+m+' 月</div>'
    +(slipEl?slipEl.outerHTML:'<p style="color:#9cb2c3">請先切換至電子薪資明細單頁面再列印</p>')
    +'</body></html>';
  openPrint(html);
}

/* Print the monthly schedule in a clean landscape window (Save as PDF from the print
   dialog). Avoids external libraries and blob downloads, which some webviews block. */
function printSchedule(){
  const card=document.getElementById('schedCard');
  if(!card){ window.print(); return; }
  const clone=card.cloneNode(true);
  clone.querySelectorAll('#btnSchedPdf,.no-print').forEach(n=>n.remove());
  clone.querySelectorAll('select').forEach(sel=>{
    const opt=sel.querySelector('option[selected]'); const val=opt?opt.textContent.trim():'';
    const c=document.createElement('div'); c.textContent=val; c.style.cssText='font-weight:700;text-align:center';
    sel.parentNode.replaceChild(c,sel);
  });
  const css=Array.from(document.querySelectorAll('style')).map(s=>s.textContent).join('\n');
  const extra='@page{size:A4 landscape;margin:8mm} html,body{background:#fff;margin:0;padding:10px}'+
    ' .card{box-shadow:none!important;border:none!important;margin:0!important}'+
    ' .scroll{overflow:visible!important} .sched th,.sched td,.sched .nm{position:static!important}'+
    ' .ch .hint{display:none} .sched{font-size:10px} .sched th,.sched td{padding:3px 3px}'+
    ' .sched .nm{min-width:84px}';
  const title='排班表_'+DB.schedule.year+pad2(DB.schedule.month);
  const doc='<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><title>'+title+
    '</title><style>'+css+'\n'+extra+'</style></head><body>'+clone.outerHTML+'</body></html>';
  openPrint(doc);
}
function stepYear(delta){
  DB.schedule.year=Math.min(2100,Math.max(2025,(Number(DB.schedule.year)||2026)+delta));
  save(); render(); const el=document.getElementById('topYear'); if(el) el.focus();
}
function stepMonth(delta){
  let m=(Number(DB.schedule.month)||1)+delta, y=Number(DB.schedule.year)||2026;
  if(m>12){ m=1; y=Math.min(2100,y+1); }
  if(m<1){ m=12; y=Math.max(2025,y-1); }
  DB.schedule.month=m; DB.schedule.year=y;
  save(); render(); const el=document.getElementById('topMonth'); if(el) el.focus();
}
document.getElementById('topYear').onchange=e=>{ DB.schedule.year=Math.min(2100,Math.max(2025,Number(e.target.value)||DB.schedule.year)); save(); render(); };
document.getElementById('topMonth').onchange=e=>{ let v=Number(e.target.value)||DB.schedule.month; v=Math.min(12,Math.max(1,v)); DB.schedule.month=v; save(); render(); };
document.getElementById('topYear').addEventListener('keydown',e=>{ if(e.key==='ArrowUp'){e.preventDefault();stepYear(1);} else if(e.key==='ArrowDown'){e.preventDefault();stepYear(-1);} });
document.getElementById('topMonth').addEventListener('keydown',e=>{ if(e.key==='ArrowUp'){e.preventDefault();stepMonth(1);} else if(e.key==='ArrowDown'){e.preventDefault();stepMonth(-1);} });
document.getElementById('yearUp').onclick=()=>stepYear(1);
document.getElementById('yearDn').onclick=()=>stepYear(-1);
document.getElementById('monUp').onclick=()=>stepMonth(1);
document.getElementById('monDn').onclick=()=>stepMonth(-1);
/* ---- robust backup: modal with download + clipboard + manual copy/paste fallbacks ---- */
function closeOv(){ const o=document.getElementById('ov'); if(o) o.remove(); }
function openOv(inner){
  closeOv();
  const o=document.createElement('div'); o.id='ov'; o.className='ov';
  o.innerHTML='<div class="box">'+inner+'</div>';
  o.addEventListener('click',e=>{ if(e.target===o) closeOv(); });
  document.body.appendChild(o);
  return o;
}
function confirmModal(title,msgHTML,okLabel,onOk){
  openOv(
    '<button class="x" id="cfX">&times;</button>'+
    '<h3>'+esc(title)+'</h3>'+
    '<p>'+msgHTML+'</p>'+
    '<div class="row">'+
      '<button class="btn" id="cfNo" style="flex:1;justify-content:center">取消</button>'+
      '<button class="btn cfdanger" id="cfYes" style="flex:1;justify-content:center">'+esc(okLabel)+'</button>'+
    '</div>'
  );
  document.getElementById('cfX').onclick=closeOv;
  document.getElementById('cfNo').onclick=closeOv;
  document.getElementById('cfYes').onclick=()=>{ closeOv(); onOk(); };
}

/* ============================== AUTH GATE ============================== */
function checkAdmin(user,pass){ return (DB.admins||[]).some(a=>a.user===user && a.pass===pass); }
let isAdmin=false;
function boot(){
  const gate=document.getElementById('gate'), app=document.getElementById('adminApp');
  if(isAdmin){ gate.style.display='none'; app.style.display='flex'; render(); }
  else{
    app.style.display='none'; gate.style.display='block';
    // 前台開啟時先拉雲端最新（同仁名單與班表），再顯示；打卡後 save() 會自動上傳
    if(WORKER_URL){ pullFromCloud().then(()=>renderGate()); } else renderGate();
  }
}
function openLogin(){
  openOv(
    '<button class="x" id="ovClose">&times;</button>'+
    '<h3>後台登入</h3>'+
    '<p>請輸入管理者帳號密碼以進入後台管理功能。前台打卡無需登入。</p>'+
    '<div class="login">'+
      '<div class="fld"><label>帳號</label><input id="luser" autocomplete="off" placeholder="帳號"></div>'+
      '<div class="fld"><label>密碼</label><input id="lpass" type="password" autocomplete="off" placeholder="密碼"></div>'+
      '<div class="err" id="lerr"></div>'+
    '</div>'+
    '<div class="row"><button class="btn primary" id="lgo" style="flex:1;justify-content:center">登入</button></div>'
  );
  document.getElementById('ovClose').onclick=closeOv;
  const u=document.getElementById('luser'), p=document.getElementById('lpass'), err=document.getElementById('lerr');
  const tryLogin=()=>{
    if(checkAdmin(u.value.trim(),p.value)){ isAdmin=true; closeOv(); current='dashboard'; boot(); }
    else { err.textContent='帳號或密碼錯誤'; p.value=''; p.focus(); }
  };
  document.getElementById('lgo').onclick=tryLogin;
  p.addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
  u.addEventListener('keydown',e=>{ if(e.key==='Enter') p.focus(); });
  setTimeout(()=>u.focus(),50);
}
document.getElementById('btnLogout').onclick=()=>{ isAdmin=false; boot(); };
